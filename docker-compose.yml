services:
  tahfiz-app:
    build: .
    container_name: tahfiz-academy
    restart: always
    stop_grace_period: 1m
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=${REDIS_URL}
      - CSRF_SECRET=${CSRF_SECRET}
      - DEFAULT_SYSTEM_OWNER_PHONE=${DEFAULT_SYSTEM_OWNER_PHONE}
      - DEFAULT_SYSTEM_OWNER_PHONE_PASSWORD=${DEFAULT_SYSTEM_OWNER_PHONE_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - tahfiz-network
    volumes:
      - ./logs:/app/logs

networks:
  tahfiz-network:
    driver: bridge
