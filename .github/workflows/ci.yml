name: CI - Pull Request Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  test-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linting
        run: npm run dev -- --help # Verify the dev environment can start or use a real lint command if added later

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm test
